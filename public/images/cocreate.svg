<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1222"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <filter id="g1"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <rect width="480" height="300" fill="url(#bg)" rx="12"/>
  <circle cx="130" cy="140" r="100" fill="#5eead4" opacity="0.03" filter="url(#g1)"/>

  <!-- Title -->
  <text x="30" y="36" font-family="'Inter',system-ui,sans-serif" font-size="11" fill="#5eead4" font-weight="600" letter-spacing="2">SLATE DETECTION — CV PIPELINE</text>
  <text x="30" y="52" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#475569">YOLOv8 · ONNX · Synthetic Dataset · Docker · REST API</text>

  <!-- Left: Slate with detection box -->
  <rect x="20" y="66" width="190" height="140" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="30" y="82" font-family="'SF Mono',monospace" font-size="7.5" fill="#475569">INPUT FRAME</text>

  <!-- Clapperboard -->
  <rect x="40" y="90" width="150" height="100" rx="4" fill="#1e293b"/>
  <rect x="40" y="90" width="150" height="18" rx="4" fill="#334155"/>
  <line x1="60" y1="90" x2="56" y2="108" stroke="#0f172a" stroke-width="1.2"/>
  <line x1="85" y1="90" x2="81" y2="108" stroke="#0f172a" stroke-width="1.2"/>
  <line x1="110" y1="90" x2="106" y2="108" stroke="#0f172a" stroke-width="1.2"/>
  <line x1="135" y1="90" x2="131" y2="108" stroke="#0f172a" stroke-width="1.2"/>
  <line x1="160" y1="90" x2="156" y2="108" stroke="#0f172a" stroke-width="1.2"/>
  <rect x="48" y="114" width="134" height="68" rx="2" fill="#172554"/>
  <text x="115" y="136" font-family="'SF Mono',monospace" font-size="8" fill="#94a3b8" text-anchor="middle">PRODUCTION</text>
  <text x="115" y="152" font-family="'SF Mono',monospace" font-size="12" fill="#e2e8f0" text-anchor="middle" font-weight="700">SCENE 04</text>
  <text x="115" y="168" font-family="'SF Mono',monospace" font-size="8" fill="#94a3b8" text-anchor="middle">TAKE 02</text>

  <!-- Detection box overlay -->
  <rect x="44" y="110" width="142" height="76" fill="none" stroke="#5eead4" stroke-width="1.5" stroke-dasharray="5,2"/>
  <line x1="44" y1="110" x2="56" y2="110" stroke="#5eead4" stroke-width="2.5"/>
  <line x1="44" y1="110" x2="44" y2="122" stroke="#5eead4" stroke-width="2.5"/>
  <line x1="186" y1="110" x2="174" y2="110" stroke="#5eead4" stroke-width="2.5"/>
  <line x1="186" y1="110" x2="186" y2="122" stroke="#5eead4" stroke-width="2.5"/>
  <line x1="44" y1="186" x2="56" y2="186" stroke="#5eead4" stroke-width="2.5"/>
  <line x1="44" y1="186" x2="44" y2="174" stroke="#5eead4" stroke-width="2.5"/>
  <line x1="186" y1="186" x2="174" y2="186" stroke="#5eead4" stroke-width="2.5"/>
  <line x1="186" y1="186" x2="186" y2="174" stroke="#5eead4" stroke-width="2.5"/>

  <!-- Confidence label -->
  <rect x="44" y="100" width="86" height="12" rx="3" fill="#5eead4"/>
  <text x="50" y="110" font-family="'SF Mono',monospace" font-size="7.5" fill="#0c1222" font-weight="700">slate  conf: 0.97</text>

  <!-- Right: Pipeline -->
  <rect x="230" y="66" width="230" height="200" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="345" y="86" font-family="'SF Mono',monospace" font-size="9" fill="#5eead4" text-anchor="middle" font-weight="600">DETECTION PIPELINE</text>

  <!-- Step 1 -->
  <rect x="244" y="96" width="202" height="32" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="345" y="110" font-family="'SF Mono',monospace" font-size="8" fill="#93c5fd" text-anchor="middle" font-weight="600">1  Synthetic Dataset Generator</text>
  <text x="345" y="122" font-family="'SF Mono',monospace" font-size="7" fill="#3b82f6" text-anchor="middle">randomized slates · bg augmentation</text>

  <line x1="345" y1="128" x2="345" y2="138" stroke="#5eead4" stroke-width="1" opacity="0.5"/>
  <path d="M342 136 L345 142 L348 136" fill="#5eead4" opacity="0.5"/>

  <!-- Step 2 -->
  <rect x="244" y="142" width="202" height="32" rx="6" fill="#064e3b" stroke="#5eead4" stroke-width="0.8"/>
  <text x="345" y="156" font-family="'SF Mono',monospace" font-size="8" fill="#5eead4" text-anchor="middle" font-weight="600">2  YOLOv8n Training</text>
  <text x="345" y="168" font-family="'SF Mono',monospace" font-size="7" fill="#5eead4" text-anchor="middle" opacity="0.8">custom head · mAP@0.5 optimized</text>

  <line x1="345" y1="174" x2="345" y2="184" stroke="#5eead4" stroke-width="1" opacity="0.5"/>
  <path d="M342 182 L345 188 L348 182" fill="#5eead4" opacity="0.5"/>

  <!-- Step 3 -->
  <rect x="244" y="188" width="202" height="32" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="345" y="202" font-family="'SF Mono',monospace" font-size="8" fill="#a78bfa" text-anchor="middle" font-weight="600">3  ONNX Inference</text>
  <text x="345" y="214" font-family="'SF Mono',monospace" font-size="7" fill="#c4b5fd" text-anchor="middle">quantized · runtime-agnostic</text>

  <line x1="345" y1="220" x2="345" y2="230" stroke="#5eead4" stroke-width="1" opacity="0.5"/>
  <path d="M342 228 L345 234 L348 228" fill="#5eead4" opacity="0.5"/>

  <!-- Step 4: REST + Docker -->
  <rect x="244" y="234" width="96" height="24" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <text x="292" y="250" font-family="'SF Mono',monospace" font-size="8" fill="#94a3b8" text-anchor="middle">REST API</text>

  <rect x="350" y="234" width="96" height="24" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <text x="398" y="250" font-family="'SF Mono',monospace" font-size="8" fill="#94a3b8" text-anchor="middle">Docker</text>

  <text x="30" y="286" font-family="'SF Mono',monospace" font-size="8" fill="#334155">YOLOv8 · ONNX · Synthetic Data Pipeline · FastAPI · Docker</text>
</svg>
