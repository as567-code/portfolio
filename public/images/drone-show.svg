<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <defs>
    <linearGradient id="bgd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060b12"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <filter id="glowD" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowDs" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="skyGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#5eead415"/>
      <stop offset="100%" stop-color="#5eead400"/>
    </radialGradient>
  </defs>

  <rect width="480" height="300" fill="url(#bgd)" rx="8"/>
  <!-- Sky ambient glow -->
  <ellipse cx="240" cy="130" rx="200" ry="100" fill="url(#skyGlow)"/>

  <!-- Stars scattered -->
  <circle cx="30" cy="20" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="80" cy="10" r="0.6" fill="white" opacity="0.3"/>
  <circle cx="150" cy="18" r="0.9" fill="white" opacity="0.35"/>
  <circle cx="220" cy="8" r="0.7" fill="white" opacity="0.4"/>
  <circle cx="300" cy="15" r="0.8" fill="white" opacity="0.3"/>
  <circle cx="370" cy="12" r="0.6" fill="white" opacity="0.35"/>
  <circle cx="440" cy="22" r="0.9" fill="white" opacity="0.4"/>
  <circle cx="460" cy="8" r="0.7" fill="white" opacity="0.3"/>
  <circle cx="55" cy="45" r="0.6" fill="white" opacity="0.25"/>
  <circle cx="420" cy="40" r="0.8" fill="white" opacity="0.3"/>

  <!-- Title -->
  <text x="240" y="28" text-anchor="middle" fill="#5eead4" font-family="monospace" font-size="11" letter-spacing="3" opacity="0.8">DRONE SWARM FORMATION</text>

  <!-- Drone formation: AIAA letters / heart shape top-down -->
  <!-- Using a star/diamond formation pattern with colored trails -->

  <!-- Formation grid — heart-ish pattern from above -->
  <!-- Row by row drone positions -->

  <!-- Row 1 (top arc of heart) -->
  <g filter="url(#glowDs)">
    <circle cx="175" cy="60" r="4" fill="#5eead4" opacity="0.9"/>
    <circle cx="195" cy="50" r="4" fill="#5eead4" opacity="0.9"/>
    <circle cx="215" cy="46" r="4" fill="#5eead4" opacity="0.95"/>
    <circle cx="235" cy="50" r="4" fill="#5eead4" opacity="0.9"/>
    <circle cx="255" cy="46" r="4" fill="#22d3ee" opacity="0.95"/>
    <circle cx="275" cy="50" r="4" fill="#22d3ee" opacity="0.9"/>
    <circle cx="295" cy="60" r="4" fill="#22d3ee" opacity="0.85"/>
  </g>

  <!-- Row 2 -->
  <g filter="url(#glowDs)">
    <circle cx="160" cy="78" r="4" fill="#5eead4" opacity="0.85"/>
    <circle cx="180" cy="70" r="4" fill="#5eead4" opacity="0.9"/>
    <circle cx="200" cy="64" r="4" fill="#5eead4" opacity="0.9"/>
    <circle cx="220" cy="62" r="4" fill="#5eead4" opacity="0.95" filter="url(#glowD)"/>
    <circle cx="240" cy="60" r="5" fill="#ffffff" opacity="0.9" filter="url(#glowD)"/>
    <circle cx="260" cy="62" r="4" fill="#22d3ee" opacity="0.95" filter="url(#glowD)"/>
    <circle cx="280" cy="64" r="4" fill="#22d3ee" opacity="0.9"/>
    <circle cx="300" cy="70" r="4" fill="#22d3ee" opacity="0.9"/>
    <circle cx="320" cy="78" r="4" fill="#22d3ee" opacity="0.85"/>
  </g>

  <!-- Row 3 -->
  <g filter="url(#glowDs)">
    <circle cx="155" cy="96" r="3.5" fill="#5eead4" opacity="0.8"/>
    <circle cx="175" cy="88" r="3.5" fill="#5eead4" opacity="0.85"/>
    <circle cx="195" cy="82" r="3.5" fill="#5eead4" opacity="0.9"/>
    <circle cx="215" cy="78" r="3.5" fill="#5eead4" opacity="0.9"/>
    <circle cx="235" cy="76" r="3.5" fill="#5eead4" opacity="0.85"/>
    <circle cx="255" cy="76" r="3.5" fill="#22d3ee" opacity="0.85"/>
    <circle cx="275" cy="78" r="3.5" fill="#22d3ee" opacity="0.9"/>
    <circle cx="295" cy="82" r="3.5" fill="#22d3ee" opacity="0.9"/>
    <circle cx="315" cy="88" r="3.5" fill="#22d3ee" opacity="0.85"/>
    <circle cx="335" cy="96" r="3.5" fill="#22d3ee" opacity="0.8"/>
  </g>

  <!-- Row 4 — narrowing -->
  <g filter="url(#glowDs)">
    <circle cx="165" cy="112" r="3" fill="#5eead4" opacity="0.75"/>
    <circle cx="185" cy="106" r="3" fill="#5eead4" opacity="0.8"/>
    <circle cx="205" cy="100" r="3" fill="#5eead4" opacity="0.85"/>
    <circle cx="225" cy="96" r="3" fill="#5eead4" opacity="0.85"/>
    <circle cx="245" cy="94" r="3" fill="#5eead490" opacity="0.8"/>
    <circle cx="265" cy="96" r="3" fill="#22d3ee" opacity="0.85"/>
    <circle cx="285" cy="100" r="3" fill="#22d3ee" opacity="0.85"/>
    <circle cx="305" cy="106" r="3" fill="#22d3ee" opacity="0.8"/>
    <circle cx="325" cy="112" r="3" fill="#22d3ee" opacity="0.75"/>
  </g>

  <!-- Row 5 — more narrow -->
  <g filter="url(#glowDs)">
    <circle cx="180" cy="128" r="3" fill="#5eead4" opacity="0.7"/>
    <circle cx="200" cy="120" r="3" fill="#5eead4" opacity="0.75"/>
    <circle cx="220" cy="114" r="3" fill="#5eead4" opacity="0.8"/>
    <circle cx="240" cy="112" r="3" fill="#5eead4" opacity="0.8"/>
    <circle cx="260" cy="114" r="3" fill="#22d3ee" opacity="0.8"/>
    <circle cx="280" cy="120" r="3" fill="#22d3ee" opacity="0.75"/>
    <circle cx="300" cy="128" r="3" fill="#22d3ee" opacity="0.7"/>
  </g>

  <!-- Row 6 — narrowing to point -->
  <g filter="url(#glowDs)">
    <circle cx="200" cy="144" r="2.5" fill="#5eead4" opacity="0.65"/>
    <circle cx="220" cy="136" r="2.5" fill="#5eead4" opacity="0.7"/>
    <circle cx="240" cy="132" r="2.5" fill="#5eead4" opacity="0.75"/>
    <circle cx="260" cy="136" r="2.5" fill="#22d3ee" opacity="0.7"/>
    <circle cx="280" cy="144" r="2.5" fill="#22d3ee" opacity="0.65"/>
  </g>

  <!-- Row 7 — tip -->
  <g filter="url(#glowDs)">
    <circle cx="225" cy="158" r="2.5" fill="#5eead4" opacity="0.6"/>
    <circle cx="240" cy="154" r="3" fill="#5eead4" opacity="0.8" filter="url(#glowD)"/>
    <circle cx="255" cy="158" r="2.5" fill="#22d3ee" opacity="0.6"/>
  </g>

  <!-- Tip point -->
  <circle cx="240" cy="170" r="2" fill="#5eead4" opacity="0.5" filter="url(#glowD)"/>

  <!-- Flight path trails for a few drones -->
  <path d="M 175 60 Q 150 40 140 80" stroke="#5eead420" stroke-width="0.8" fill="none" stroke-dasharray="2,4"/>
  <path d="M 295 60 Q 320 40 330 80" stroke="#22d3ee20" stroke-width="0.8" fill="none" stroke-dasharray="2,4"/>
  <path d="M 240 170 Q 240 185 240 195" stroke="#5eead415" stroke-width="0.8" fill="none" stroke-dasharray="2,4"/>

  <!-- Ground horizon line -->
  <line x1="30" y1="215" x2="450" y2="215" stroke="#ffffff08" stroke-width="1"/>

  <!-- Ground perspective grid -->
  <line x1="240" y1="215" x2="50" y2="290" stroke="#5eead408" stroke-width="0.5"/>
  <line x1="240" y1="215" x2="430" y2="290" stroke="#5eead408" stroke-width="0.5"/>
  <line x1="240" y1="215" x2="140" y2="290" stroke="#5eead408" stroke-width="0.5"/>
  <line x1="240" y1="215" x2="340" y2="290" stroke="#5eead408" stroke-width="0.5"/>
  <line x1="50" y1="248" x2="430" y2="248" stroke="#5eead408" stroke-width="0.5"/>
  <line x1="30" y1="270" x2="450" y2="270" stroke="#5eead408" stroke-width="0.5"/>

  <!-- Info bar -->
  <rect x="18" y="224" width="444" height="32" rx="5" fill="#5eead408" stroke="#5eead418"/>
  <text x="70" y="237" text-anchor="middle" fill="#5eead480" font-family="monospace" font-size="8">ArduPilot SITL</text>
  <text x="175" y="237" text-anchor="middle" fill="#22d3ee80" font-family="monospace" font-size="8">Skybrush</text>
  <text x="270" y="237" text-anchor="middle" fill="#a78bfa80" font-family="monospace" font-size="8">Swarm Coord.</text>
  <text x="390" y="237" text-anchor="middle" fill="#ffffff50" font-family="monospace" font-size="8">Python</text>
  <text x="70" y="249" text-anchor="middle" fill="#5eead450" font-family="monospace" font-size="7">Sim. env</text>
  <text x="175" y="249" text-anchor="middle" fill="#22d3ee50" font-family="monospace" font-size="7">choreography</text>
  <text x="270" y="249" text-anchor="middle" fill="#a78bfa50" font-family="monospace" font-size="7">multi-UAV</text>
  <text x="390" y="249" text-anchor="middle" fill="#ffffff30" font-family="monospace" font-size="7">scripts</text>

  <!-- AIAA label -->
  <text x="240" y="283" text-anchor="middle" fill="#ffffff20" font-family="monospace" font-size="8">AIAA UTD · Club Activity</text>

  <rect width="480" height="300" fill="none" stroke="#5eead415" stroke-width="1" rx="8"/>
</svg>
