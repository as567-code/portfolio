<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="600" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c1222"/>
      <stop offset="100%" stop-color="#0a0e17"/>
    </linearGradient>
    <radialGradient id="glowTeal" cx="300" cy="350" r="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowIndigo" cx="300" cy="500" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="200" y1="480" x2="400" y2="750" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="250" y1="180" x2="350" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#c4956a"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="200" y1="120" x2="400" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="bodyClip">
      <rect x="0" y="0" width="600" height="800"/>
    </clipPath>
  </defs>

  <!-- Ambient glow effects -->
  <rect width="600" height="800" fill="url(#bgGrad)" opacity="0"/>
  <ellipse cx="300" cy="350" rx="280" ry="280" fill="url(#glowTeal)"/>
  <ellipse cx="300" cy="500" rx="200" ry="200" fill="url(#glowIndigo)"/>

  <!-- Floating code particles -->
  <text x="80" y="150" font-family="SF Mono, monospace" font-size="11" fill="#22d3ee" opacity="0.2">&lt;/&gt;</text>
  <text x="480" y="200" font-family="SF Mono, monospace" font-size="10" fill="#14b8a6" opacity="0.15">{ }</text>
  <text x="100" y="650" font-family="SF Mono, monospace" font-size="9" fill="#6366f1" opacity="0.15">fn()</text>
  <text x="460" y="580" font-family="SF Mono, monospace" font-size="11" fill="#22d3ee" opacity="0.18">=>;</text>
  <text x="140" y="400" font-family="SF Mono, monospace" font-size="8" fill="#14b8a6" opacity="0.12">01</text>
  <text x="440" y="350" font-family="SF Mono, monospace" font-size="8" fill="#6366f1" opacity="0.12">10</text>

  <g clip-path="url(#bodyClip)">
    <!-- Body / Shirt -->
    <path d="M160 520 Q160 480 200 460 Q250 440 300 440 Q350 440 400 460 Q440 480 440 520 L460 800 L140 800 Z" fill="url(#bodyGrad)" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.3"/>

    <!-- Shirt collar detail -->
    <path d="M260 445 L300 475 L340 445" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.4"/>

    <!-- Shirt code pattern -->
    <text x="220" y="560" font-family="SF Mono, monospace" font-size="8" fill="#22d3ee" opacity="0.08">const dev = new Engineer();</text>
    <text x="230" y="580" font-family="SF Mono, monospace" font-size="8" fill="#14b8a6" opacity="0.06">await dev.build(awesome);</text>
    <text x="210" y="600" font-family="SF Mono, monospace" font-size="8" fill="#6366f1" opacity="0.06">deploy({ target: 'prod' });</text>

    <!-- Neck -->
    <rect x="275" y="400" width="50" height="50" rx="8" fill="url(#skinGrad)"/>

    <!-- Head shape -->
    <ellipse cx="300" cy="300" rx="95" ry="115" fill="url(#skinGrad)"/>

    <!-- Hair -->
    <path d="M205 280 Q205 185 260 165 Q290 155 320 158 Q370 165 390 200 Q400 225 395 280 Q390 240 370 220 Q340 195 300 190 Q260 190 235 215 Q215 240 210 280 Z" fill="url(#hairGrad)"/>

    <!-- Hair side detail -->
    <path d="M208 275 Q205 250 215 230 Q210 260 212 280" fill="#0d0d1a" opacity="0.5"/>
    <path d="M392 275 Q395 250 385 230 Q390 260 388 280" fill="#0d0d1a" opacity="0.5"/>

    <!-- Eyebrows -->
    <path d="M248 268 Q265 260 282 266" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M318 266 Q335 260 352 268" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round" fill="none"/>

    <!-- Eyes -->
    <ellipse cx="265" cy="290" rx="18" ry="14" fill="white"/>
    <ellipse cx="335" cy="290" rx="18" ry="14" fill="white"/>
    <circle cx="268" cy="290" r="8" fill="#1a1a2e"/>
    <circle cx="338" cy="290" r="8" fill="#1a1a2e"/>
    <circle cx="270" cy="288" r="3" fill="white"/>
    <circle cx="340" cy="288" r="3" fill="white"/>

    <!-- Nose -->
    <path d="M295 310 Q300 330 305 310" stroke="#b8956a" stroke-width="1.5" fill="none"/>

    <!-- Smile -->
    <path d="M270 350 Q300 375 330 350" stroke="#b8956a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Ears -->
    <ellipse cx="205" cy="305" rx="12" ry="18" fill="#c4956a"/>
    <ellipse cx="395" cy="305" rx="12" ry="18" fill="#c4956a"/>

    <!-- Glasses (optional tech look) -->
    <rect x="240" y="275" width="46" height="32" rx="6" fill="none" stroke="#334155" stroke-width="2.5"/>
    <rect x="314" y="275" width="46" height="32" rx="6" fill="none" stroke="#334155" stroke-width="2.5"/>
    <line x1="286" y1="291" x2="314" y2="291" stroke="#334155" stroke-width="2"/>
    <!-- Glass reflection -->
    <line x1="248" y1="280" x2="258" y2="280" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
    <line x1="322" y1="280" x2="332" y2="280" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Tech aura ring -->
  <circle cx="300" cy="380" r="230" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.15" stroke-dasharray="8 12"/>
  <circle cx="300" cy="380" r="260" fill="none" stroke="#6366f1" stroke-width="0.3" opacity="0.1" stroke-dasharray="4 16"/>
</svg>
