<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1222"/>
      <stop offset="100%" stop-color="#071523"/>
    </linearGradient>
    <radialGradient id="mapglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0c1222" stop-opacity="0"/>
    </radialGradient>
    <filter id="g1"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="480" height="300" fill="url(#bg)" rx="12"/>
  <circle cx="180" cy="150" r="130" fill="#5eead4" opacity="0.02" filter="url(#g2)"/>

  <!-- Title -->
  <text x="30" y="36" font-family="'Inter',system-ui,sans-serif" font-size="11" fill="#5eead4" font-weight="600" letter-spacing="2">VOYAGR — AI TRAVEL RECOMMENDER</text>
  <text x="30" y="52" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#475569">Angular · Express · Gemini API · Firebase · TypeScript</text>

  <!-- Map area with globe lines -->
  <ellipse cx="160" cy="160" rx="130" ry="80" fill="url(#mapglow)"/>
  <ellipse cx="160" cy="160" rx="130" ry="80" fill="none" stroke="#1e293b" stroke-width="0.4" opacity="0.4"/>
  <ellipse cx="160" cy="160" rx="90" ry="80" fill="none" stroke="#1e293b" stroke-width="0.4" opacity="0.3"/>
  <line x1="30" y1="160" x2="290" y2="160" stroke="#1e293b" stroke-width="0.4" opacity="0.3"/>

  <!-- Destination pins -->
  <!-- Tokyo -->
  <circle cx="250" cy="120" r="5" fill="#5eead4" filter="url(#g1)" opacity="0.8"/>
  <circle cx="250" cy="120" r="2.5" fill="#5eead4"/>
  <line x1="250" y1="120" x2="250" y2="136" stroke="#5eead4" stroke-width="0.8" opacity="0.6"/>
  <rect x="232" y="136" width="38" height="12" rx="3" fill="#0f172a" stroke="#5eead4" stroke-width="0.6"/>
  <text x="251" y="145" font-family="'SF Mono',monospace" font-size="6.5" fill="#5eead4" text-anchor="middle">Tokyo</text>

  <!-- Paris -->
  <circle cx="145" cy="110" r="5" fill="#a78bfa" filter="url(#g1)" opacity="0.8"/>
  <circle cx="145" cy="110" r="2.5" fill="#a78bfa"/>
  <line x1="145" y1="110" x2="145" y2="126" stroke="#a78bfa" stroke-width="0.8" opacity="0.6"/>
  <rect x="127" y="126" width="38" height="12" rx="3" fill="#0f172a" stroke="#a78bfa" stroke-width="0.6"/>
  <text x="146" y="135" font-family="'SF Mono',monospace" font-size="6.5" fill="#a78bfa" text-anchor="middle">Paris</text>

  <!-- NYC -->
  <circle cx="85" cy="125" r="5" fill="#fbbf24" filter="url(#g1)" opacity="0.8"/>
  <circle cx="85" cy="125" r="2.5" fill="#fbbf24"/>
  <line x1="85" y1="125" x2="85" y2="141" stroke="#fbbf24" stroke-width="0.8" opacity="0.6"/>
  <rect x="70" y="141" width="32" height="12" rx="3" fill="#0f172a" stroke="#fbbf24" stroke-width="0.6"/>
  <text x="86" y="150" font-family="'SF Mono',monospace" font-size="6.5" fill="#fbbf24" text-anchor="middle">NYC</text>

  <!-- Flight paths -->
  <path d="M 85 125 Q 115 90 145 110" fill="none" stroke="#fbbf24" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>
  <path d="M 145 110 Q 195 75 250 120" fill="none" stroke="#a78bfa" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Small dots -->
  <circle cx="210" cy="175" r="3" fill="#5eead4" opacity="0.4"/>
  <circle cx="110" cy="190" r="2.5" fill="#a78bfa" opacity="0.3"/>

  <!-- Right: AI Recommendation Card -->
  <rect x="290" y="66" width="170" height="200" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>

  <rect x="290" y="66" width="170" height="28" rx="8" fill="#1e293b"/>
  <rect x="290" y="82" width="170" height="12" fill="#1e293b"/>
  <text x="375" y="84" font-family="'SF Mono',monospace" font-size="10" fill="#5eead4" text-anchor="middle" font-weight="600">voyagr</text>
  <text x="375" y="94" font-family="'SF Mono',monospace" font-size="7" fill="#475569" text-anchor="middle">AI Travel Recommender</text>

  <!-- Gemini + Firebase badges -->
  <rect x="302" y="102" width="66" height="14" rx="4" fill="#1d4ed8" opacity="0.8"/>
  <text x="335" y="112" font-family="'SF Mono',monospace" font-size="7" fill="white" text-anchor="middle">Gemini API</text>
  <rect x="374" y="102" width="76" height="14" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.7"/>
  <text x="412" y="112" font-family="'SF Mono',monospace" font-size="7" fill="#94a3b8" text-anchor="middle">Firebase Auth</text>

  <!-- Query -->
  <rect x="302" y="122" width="148" height="20" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.7"/>
  <text x="376" y="136" font-family="'SF Mono',monospace" font-size="7" fill="#475569" text-anchor="middle">"3-day Tokyo, anime focus"</text>

  <line x1="376" y1="142" x2="376" y2="150" stroke="#5eead4" stroke-width="1" opacity="0.5"/>
  <path d="M373 148 L376 154 L379 148" fill="#5eead4" opacity="0.5"/>

  <!-- Recommendation -->
  <rect x="302" y="154" width="148" height="76" rx="6" fill="#1e293b" stroke="#5eead4" stroke-width="0.8"/>
  <text x="376" y="168" font-family="'SF Mono',monospace" font-size="7.5" fill="#5eead4" text-anchor="middle" font-weight="600">Tokyo Recommendation</text>
  <line x1="302" y1="172" x2="450" y2="172" stroke="#1e293b" stroke-width="0.5"/>
  <text x="310" y="184" font-family="'SF Mono',monospace" font-size="7" fill="#94a3b8">Day 1: Akihabara</text>
  <text x="310" y="195" font-family="'SF Mono',monospace" font-size="7" fill="#94a3b8">Day 2: Shinjuku Gyoen</text>
  <text x="310" y="206" font-family="'SF Mono',monospace" font-size="7" fill="#94a3b8">Day 3: TeamLab</text>
  <line x1="302" y1="211" x2="450" y2="211" stroke="#1e293b" stroke-width="0.5"/>
  <text x="310" y="224" font-family="'SF Mono',monospace" font-size="7" fill="#5eead4">Budget: ¥45,000</text>

  <!-- Tech badges -->
  <rect x="302" y="238" width="50" height="14" rx="3" fill="#1e293b" stroke="#ef4444" stroke-width="0.6"/>
  <text x="327" y="248" font-family="'SF Mono',monospace" font-size="7" fill="#fca5a5" text-anchor="middle">Angular</text>
  <rect x="358" y="238" width="50" height="14" rx="3" fill="#1e293b" stroke="#334155" stroke-width="0.6"/>
  <text x="383" y="248" font-family="'SF Mono',monospace" font-size="7" fill="#94a3b8" text-anchor="middle">Express</text>
  <rect x="414" y="238" width="36" height="14" rx="3" fill="#1e293b" stroke="#334155" stroke-width="0.6"/>
  <text x="432" y="248" font-family="'SF Mono',monospace" font-size="7" fill="#94a3b8" text-anchor="middle">TS</text>

  <text x="30" y="286" font-family="'SF Mono',monospace" font-size="8" fill="#334155">Angular · Express · Gemini API · Firebase · TypeScript</text>
</svg>
